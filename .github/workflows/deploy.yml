name: Deploy Jedzonko Planer

on:
  push:
    branches:
      - main  # lub master, zależnie jak nazywa się Twoja gałąź

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Ustawienie wersji Node

      - name: Install dependencies
        run: npm install  # TO JEST KLUCZOWE - bez tego wywali błąd 127

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages # (Jeśli tam hostujesz)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite buduje do folderu dist
          branch: gh-pages