name: Deploy Jedzonko Planer

on:
  push:
    branches:
      - main  # Sprawdź czy Twoja gałąź to 'main' czy 'master'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          # GitHub musi znać te zmienne, aby build się udał
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder, w którym Vite generuje gotową stronę
          branch: gh-pages # Gałąź, na której GitHub trzyma pliki strony